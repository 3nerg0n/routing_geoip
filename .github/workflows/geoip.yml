name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Идеальная очистка IP через Python
      - name: Clean IP files with Python
        run: |
          python3 -c "
          import os, re
          src = 'main/geoip'
          dst = 'cleaned_geoip'
          os.makedirs(dst, exist_ok=True)
          for fname in os.listdir(src):
              with open(os.path.join(src, fname), 'r') as f:
                  lines = f.readlines()
              cleaned = []
              for line in lines:
                  line = re.sub(r'#.*', '', line).strip() # Убрать комментарии и пробелы
                  if not line: continue
                  if '/' not in line: # Если нет маски, добавить /32
                      if ':' in line: line += '/128' # Для IPv6
                      else: line += '/32' # Для IPv4
                  cleaned.append(line)
              if cleaned:
                  with open(os.path.join(dst, fname), 'w') as f:
                      f.write('\n'.join(cleaned) + '\n')
                  print(f'File {fname}: {len(cleaned)} IPs saved')
          "

      # ШАГ 2: Генерация config.json (тип 'text' и абсолютные пути)
      - name: Generate Config
        run: |
          CLEANED_PATH=$(realpath cleaned_geoip)
          echo '{"input": [' > config.json
          FIRST=true
          for f in $CLEANED_PATH/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка
      - name: Build geoip.dat
        run: |
          cd builder
          go build -o geoip_tool
          ./geoip_tool convert -c ../config.json
          
          # Проверка результата
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"
          if [ $size -le 700 ]; then echo "ERROR: geoip.dat is still empty!"; exit 1; fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
