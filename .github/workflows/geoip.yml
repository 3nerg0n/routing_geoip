name: Build GeoIP Manual Config
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**', 'config.json' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Очистка IP через Python (гарантия от пустого файла)
      - name: Clean IP files
        run: |
          python3 -c "
          import os, re
          src = 'main/geoip'
          dst = 'builder/data'
          os.makedirs(dst, exist_ok=True)
          for fname in os.listdir(src):
              if os.path.isdir(os.path.join(src, fname)): continue
              with open(os.path.join(src, fname), 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              cleaned = []
              for line in lines:
                  line = re.sub(r'#.*', '', line).strip()
                  if not line: continue
                  if '/' not in line:
                      line += '/128' if ':' in line else '/32'
                  cleaned.append(line)
              if cleaned:
                  with open(os.path.join(dst, fname), 'w', encoding='utf-8') as f:
                      f.write('\n'.join(cleaned) + '\n')
                  print(f'File {fname}: {len(cleaned)} IPs saved')
          "

      # ШАГ 2: Сборка с твоим config.json
      - name: Build geoip.dat
        run: |
          # Копируем твой ручной конфиг в папку сборщика
          cp main/config.json builder/config.json
          
          cd builder
          # Запускаем сборку
          go run ./ convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 700 ]; then 
              echo "ERROR: geoip.dat is still empty (676 bytes)!"
              exit 1
            fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
