name: Build GeoIP Hydra Style
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Подготовка файлов (добавляем .txt и чистим)
      - name: Prepare IP files
        run: |
          echo "--- Cleaning and adding .txt extension ---"
          # Очищаем папку сборщика от лишнего, если нужно
          find main/geoip -type f | while read file; do
            name=$(basename "$file")
            # Удаляем \r, комментарии и пробелы. Сохраняем как .txt
            tr -d '\r' < "$file" | sed 's/#.*//g; s/[[:space:]]//g' | grep -v '^$' > "builder/${name}.txt"
            echo "File ${name}.txt: $(wc -l < builder/${name}.txt) lines"
          done

      # ШАГ 2: Генерация config.json (в точности как у hydraponique)
      - name: Generate Config
        run: |
          cd builder
          echo '{"input": [' > config.json
          FIRST=true
          # Перечисляем все созданные .txt файлы
          for f in *.txt; do
            # Имя тега (без .txt)
            tag="${f%.txt}"
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # Используем формат: тип text, имя тега, путь к .txt файлу
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$tag\", \"uri\": \"./$f\"}}" >> config.json
          done
          # Вывод в формате v2rayGeoIPDat
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка
      - name: Build geoip.dat
        run: |
          cd builder
          # Собираем инструмент
          go build -o geoip_tool
          # Запускаем конвертацию
          ./geoip_tool convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 700 ]; then 
              echo "ERROR: geoip.dat is still empty (676 bytes)!"
              exit 1
            fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
