name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Идеальная очистка файлов через Python
      - name: Clean IP files
        run: |
          python3 -c "
          import os, re
          src = 'main/geoip'
          dst = 'cleaned_txt'
          os.makedirs(dst, exist_ok=True)
          for fname in os.listdir(src):
              if os.path.isdir(os.path.join(src, fname)): continue
              with open(os.path.join(src, fname), 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              cleaned = []
              for line in lines:
                  # Убираем комментарии, пробелы и невидимые символы
                  line = re.sub(r'#.*', '', line).strip()
                  if not line: continue
                  # Добавляем /32 если это одиночный IP
                  if '/' not in line:
                      if ':' in line: line += '/128'
                      else: line += '/32'
                  cleaned.append(line)
              if cleaned:
                  with open(os.path.join(dst, fname + '.txt'), 'w', encoding='utf-8') as f:
                      f.write('\n'.join(cleaned) + '\n')
                  print(f'File {fname}: {len(cleaned)} IPs saved')
          "

      # ШАГ 2: Генерация config.json с АБСОЛЮТНЫМИ путями
      - name: Generate Config
        run: |
          CLEANED_DIR=$(realpath cleaned_txt)
          echo '{"input": [' > config.json
          FIRST=true
          for f in $CLEANED_DIR/*.txt; do
            filename=$(basename "$f")
            tag="${filename%.txt}"
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # Используем тип 'text' и абсолютный путь
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$tag\", \"uri\": \"$f\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка инструмента и запуск
      - name: Build and Run
        run: |
          cd builder
          go build -o geoip_tool
          # Запускаем конвертацию
          ./geoip_tool convert -c ../config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 700 ]; then 
              echo "ERROR: geoip.dat is still empty (676 bytes)!"
              exit 1
            fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
