name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Идеальная очистка IP через Python
      # Мы сохраняем файлы БЕЗ расширения .txt, так как имя файла станет тегом
      - name: Clean IP files
        run: |
          python3 -c "
          import os, re
          src = 'main/geoip'
          dst = 'builder/geoip_data'
          os.makedirs(dst, exist_ok=True)
          for fname in os.listdir(src):
              if os.path.isdir(os.path.join(src, fname)): continue
              with open(os.path.join(src, fname), 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              cleaned = []
              for line in lines:
                  line = re.sub(r'#.*', '', line).strip()
                  if not line: continue
                  if '/' not in line:
                      line += '/128' if ':' in line else '/32'
                  cleaned.append(line)
              if cleaned:
                  # Сохраняем файл с оригинальным именем (SberBank, RU и т.д.)
                  with open(os.path.join(dst, fname), 'w', encoding='utf-8') as f:
                      f.write('\n'.join(cleaned) + '\n')
                  print(f'File {fname}: {len(cleaned)} IPs saved')
          "

      # ШАГ 2: Генерация ПРАВИЛЬНОГО config.json
      # Используем тип v2raygeoip для папки целиком
      - name: Generate Config
        run: |
          cd builder
          cat <<EOF > config.json
          {
            "input": [
              {
                "type": "v2raygeoip",
                "action": "add",
                "args": {
                  "uri": "./geoip_data"
                }
              },
              {
                "type": "private",
                "action": "add"
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputName": "geoip.dat"
                }
              }
            ]
          }
          EOF
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка
      - name: Build geoip.dat
        run: |
          cd builder
          go run ./ convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 1000 ]; then 
              echo "ERROR: geoip.dat is too small! Something went wrong."
              exit 1
            fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
