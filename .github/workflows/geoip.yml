name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Очистка IP и подготовка файлов (добавляем .txt)
      - name: Prepare IP files
        run: |
          mkdir -p builder/txt
          echo "--- Cleaning and preparing files ---"
          # Обрабатываем каждый файл из твоей папки geoip
          for file in main/geoip/*; do
            name=$(basename "$file")
            # Удаляем мусор, пустые строки и символы Windows. Сохраняем как .txt
            # Добавляем /32 только если это чистый IP без маски
            sed 's/\r//g; s/#.*//g; s/[[:space:]]//g' "$file" | grep -v '^$' | \
            sed -E 's/^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$/\1\/32/' > "builder/txt/${name}.txt"
            
            echo "Processed $name -> txt/${name}.txt ($(wc -l < builder/txt/${name}.txt) lines)"
          done

      # ШАГ 2: Генерация config.json и сборка
      - name: Build geoip.dat
        run: |
          cd builder
          # Генерируем конфиг с относительными путями
          echo '{"input": [' > config.json
          FIRST=true
          for f in txt/*.txt; do
            filename=$(basename "$f")
            tag="${filename%.txt}"
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$tag\", \"uri\": \"./txt/$filename\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

          # Собираем и запускаем инструмент
          go build -o geoip_tool
          ./geoip_tool convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          if [ -f "output/dat/geoip.dat" ]; then
            cp output/dat/geoip.dat ../release/
            size=$(stat -c%s "../release/geoip.dat")
            echo "--- Final size: $size bytes ---"
            if [ $size -le 700 ]; then 
              echo "ERROR: geoip.dat is still empty! Check if files in builder/txt/ are valid."
              ls -l txt/
              exit 1
            fi
          else
            echo "ERROR: output/dat/geoip.dat not found!"
            exit 1
          fi

      # ШАГ 3: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
