name: Build GeoIP Final Fix
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'geoip/**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Loyalsoldier builder
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: builder

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      # ШАГ 1: Подготовка файлов (простое копирование и удаление мусора)
      - name: Prepare IP files
        run: |
          mkdir -p builder/data
          echo "--- Copying and cleaning files ---"
          for file in main/geoip/*; do
            name=$(basename "$file")
            # Удаляем символы Windows (\r) и пустые строки
            tr -d '\r' < "$file" | grep -v '^$' > "builder/data/$name"
            echo "File $name: $(wc -l < builder/data/$name) lines"
          done

      # ШАГ 2: Генерация config.json (тип "text", без фильтров)
      - name: Generate Config
        run: |
          cd builder
          echo '{"input": [' > config.json
          FIRST=true
          for f in data/*; do
            name=$(basename "$f")
            if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> config.json; fi
            # Используем тип "text" - это стандарт для Loyalsoldier
            echo "{\"type\": \"text\", \"action\": \"add\", \"args\": {\"name\": \"$name\", \"uri\": \"./data/$name\"}}" >> config.json
          done
          echo '], "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputName": "geoip.dat"}}]}' >> config.json
          
          echo "--- Generated config.json ---"
          cat config.json

      # ШАГ 3: Сборка
      - name: Build geoip.dat
        run: |
          cd builder
          go run ./ convert -c config.json
          
          # Проверка результата
          mkdir -p ../release
          cp output/dat/geoip.dat ../release/
          size=$(stat -c%s "../release/geoip.dat")
          echo "--- Final size: $size bytes ---"
          if [ $size -le 700 ]; then echo "ERROR: geoip.dat is still empty!"; exit 1; fi

      # ШАГ 4: Публикация
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest GeoIP Build"
          files: release/geoip.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
